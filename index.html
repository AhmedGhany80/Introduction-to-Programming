<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>اختبار أساسيات البرمجة | م/ أحمد عبدالغني</title>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* Custom Fonts */
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Fira+Code:wght@400;500&display=swap');

       :root{
    --primary-blue:#0F4C81;
    --primary-light:#3B82F6;
    --secondary:#1E293B;
    --success:#22C55E;
    --danger:#EF4444;
    --warning:#F59E0B;
    --background:#F8FAFC;
    --card:#FFFFFF;
    --border:#E2E8F0;
}

       body{
    font-family:'Cairo',sans-serif;
    background:linear-gradient(135deg,#F8FAFC,#EEF5FF);
    user-select:none;
    -webkit-user-select:none;
    overflow:hidden;
}
        .exam-card{
    background:white;
    border-radius:20px;
    box-shadow:0 15px 35px rgba(0,0,0,.08);
}

.exam-title{

    font-size:55px;

    font-weight:900;

    color:#0F4C81;

}

.exam-sub{

    color:#64748B;

    font-size:22px;

}

.start-btn{

    background:#0F4C81;

    color:white;

    padding:18px 60px;

    border-radius:60px;

    font-size:24px;

    font-weight:bold;

    transition:.3s;

}

.start-btn:hover{

    transform:translateY(-3px);

    box-shadow:0 10px 25px rgba(15,76,129,.35);

}

.question-card{

    background:white;

    border-radius:18px;

    box-shadow:0 10px 30px rgba(0,0,0,.06);

}

.answer{

    border:2px solid #E2E8F0;

    border-radius:15px;

    padding:18px;

    cursor:pointer;

    transition:.25s;

}

.answer:hover{

    border-color:#3B82F6;

    transform:scale(1.02);

}

.answer.selected{

    border-color:#0F4C81;

    background:#EEF5FF;

}

.timer{

    font-size:26px;

    font-weight:bold;

    color:#0F4C81;

}

.progress{

    height:10px;

    border-radius:10px;

    overflow:hidden;

    background:#E2E8F0;

}

.progress div{

    background:#22C55E;

    height:100%;

}
        
        /* تأثير النبض للزر */
        @keyframes pulse-btn {
            0% { box-shadow: 0 0 0 0 rgba(0, 86, 179, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(0, 86, 179, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 86, 179, 0); }
        }
        .btn-pulse {
            animation: pulse-btn 2s infinite;
        }
    </style>
</head>
<body class="bg-white text-gray-800 h-screen flex flex-col overflow-hidden">
    <div id="root" class="h-full flex flex-col"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

       const questionsData = [

{
id:1,
question:"ما هو الكمبيوتر؟",
options:[
"جهاز يقوم بتنفيذ التعليمات ومعالجة البيانات",
"برنامج لتصفح الإنترنت",
"لغة برمجة",
"نظام تشغيل"
],
correctIndex:0,
rationale:"الكمبيوتر هو جهاز إلكتروني يستقبل البيانات ويعالجها ويخرج النتائج."
},

{
id:2,
question:"أي مما يلي يعتبر من وحدات الإدخال؟",
options:[
"الشاشة",
"الطابعة",
"لوحة المفاتيح",
"السماعات"
],
correctIndex:2,
rationale:"لوحة المفاتيح تستخدم لإدخال البيانات إلى الكمبيوتر."
},

{
id:3,
question:"أي جزء يعتبر عقل الكمبيوتر؟",
options:[
"RAM",
"CPU",
"SSD",
"GPU"
],
correctIndex:1,
rationale:"المعالج CPU هو المسؤول عن تنفيذ جميع التعليمات."
},

{
id:4,
question:"ما وظيفة RAM؟",
options:[
"تخزين دائم",
"تشغيل نظام التشغيل",
"تخزين مؤقت للبيانات أثناء التشغيل",
"عرض الصور"
],
correctIndex:2,
rationale:"RAM تخزن البيانات بشكل مؤقت أثناء تشغيل البرامج."
},

{
id:5,
question:"أي وسيلة تخزين أسرع؟",
options:[
"HDD",
"SSD",
"DVD",
"Flash CD"
],
correctIndex:1,
rationale:"SSD أسرع كثيراً من HDD."
},

{
id:6,
question:"ما وظيفة نظام التشغيل؟",
options:[
"تشغيل وإدارة موارد الكمبيوتر",
"تصميم الصور",
"كتابة الأكواد",
"الاتصال بالإنترنت فقط"
],
correctIndex:0,
rationale:"نظام التشغيل هو المسؤول عن إدارة الجهاز بالكامل."
},

{
id:7,
question:"أي مما يلي يعد Hardware؟",
options:[
"Microsoft Word",
"Windows",
"لوحة المفاتيح",
"Google Chrome"
],
correctIndex:2,
rationale:"لوحة المفاتيح قطعة مادية."
},

{
id:8,
question:"أي مما يلي يعد Software؟",
options:[
"الشاشة",
"الفأرة",
"Windows",
"الرام"
],
correctIndex:2,
rationale:"Windows برنامج وليس قطعة مادية."
},

{
id:9,
question:"أي من التالي يعتبر جهاز إخراج؟",
options:[
"Keyboard",
"Scanner",
"Printer",
"Mouse"
],
correctIndex:2,
rationale:"الطابعة من أجهزة الإخراج."
},

{
id:10,
question:"البيانات داخل الكمبيوتر يتم تمثيلها باستخدام؟",
options:[
"الحروف",
"الأرقام فقط",
"النظام الثنائي Binary",
"الرموز"
],
correctIndex:2,
rationale:"كل البيانات داخل الكمبيوتر تتحول إلى 0 و1."
},

{
id:11,
question:"ماذا يمثل الرقمان 0 و1 داخل الكمبيوتر؟",
options:[
"لغة الآلة",
"لغة C#",
"لغة Python",
"لغة HTML"
],
correctIndex:0,
rationale:"الكمبيوتر يفهم لغة الآلة المكونة من 0 و1."
},

{
id:12,
question:"أي من التالي مثال على برنامج Application؟",
options:[
"Windows",
"Linux",
"Microsoft Word",
"BIOS"
],
correctIndex:2,
rationale:"Microsoft Word من البرامج التطبيقية."
},

{
id:13,
question:"أي مما يلي يعتبر نظام تشغيل؟",
options:[
"Excel",
"Windows",
"PowerPoint",
"Photoshop"
],
correctIndex:1,
rationale:"Windows هو أشهر أنظمة التشغيل."
},

{
id:14,
question:"ما هو الهدف الأساسي من البرمجة؟",
options:[
"تصميم الصور",
"إعطاء أوامر للكمبيوتر",
"شراء أجهزة",
"تصفح الإنترنت"
],
correctIndex:1,
rationale:"البرمجة هي كتابة تعليمات للكمبيوتر."
},

{
id:15,
question:"ما هي الخوارزمية Algorithm؟",
options:[
"برنامج مضاد للفيروسات",
"لغة برمجة",
"مجموعة خطوات مرتبة لحل مشكلة",
"نوع من أنواع الكمبيوتر"
],
correctIndex:2,
rationale:"الخوارزمية هي خطوات منطقية لحل مشكلة معينة."
}

];


        function App() {
            // New State for Game Flow
            const [hasStarted, setHasStarted] = useState(false);
            
            const [currentQuestionIndex, setCurrentQuestionIndex] = useState(0);
            const [answers, setAnswers] = useState({});
            const [flagged, setFlagged] = useState({});
            const [timeLeft, setTimeLeft] = useState(10 * 60);
            const [isFinished, setIsFinished] = useState(false);

            // Timer Logic - Starts only if hasStarted is true
            useEffect(() => {
                if (!hasStarted || isFinished) return;
                
                const timer = setInterval(() => {
                    setTimeLeft(prev => {
                        if (prev <= 1) {
                            clearInterval(timer);
                            finishExam();
                            return 0;
                        }
                        return prev - 1;
                    });
                }, 1000);
                return () => clearInterval(timer);
            }, [hasStarted, isFinished]);

            const formatTime = (seconds) => {
                const m = Math.floor(seconds / 60);
                const s = seconds % 60;
                return `${m < 10 ? '0' : ''}${m}:${s < 10 ? '0' : ''}${s}`;
            };

            const handleAnswerSelect = (optionIndex) => {
                if (isFinished) return;
                setAnswers(prev => ({...prev, [currentQuestionIndex]: optionIndex}));
            };

            const toggleFlag = () => {
                if (isFinished) return;
                setFlagged(prev => ({
                    ...prev, 
                    [currentQuestionIndex]: !prev[currentQuestionIndex]
                }));
            };

            const finishExam = () => {
                setIsFinished(true);
            };

            const scoreData = useMemo(() => {
                let score = 0;
                questionsData.forEach((q, idx) => {
                    if (answers[idx] === q.correctIndex) score++;
                });
                const percentage = (score / questionsData.length) * 100;
                return { score, percentage };
            }, [answers]);

            // --- 1. WELCOME SCREEN ---
            if (!hasStarted) {
                return (
                    <div className="flex flex-col items-center justify-center h-screen bg-gray-50 relative animate-fade-in p-6">
                        {/* Instructor Name - Right Side */}
                        <div className="absolute top-8 right-8 md:top-12 md:right-16 text-right border-r-4 border-[#0056b3] pr-4">
                            <p className="text-gray-500 text-sm font-semibold mb-1">إعداد وإشراف</p>
                            <h2 className="text-3xl md:text-4xl font-black text-gray-800">م/ أحمد عبدالغني</h2>
                        </div>

                        {/* Center Content */}
                        <div className="text-center max-w-lg w-full">
                            <div className="mb-12">
                                <div className="inline-block p-4 rounded-full bg-blue-50 mb-6 border border-blue-100">
                                    <i className="fa-solid fa-laptop-code text-5xl text-[#0056b3]"></i>
                                </div>
                                <h1 className="text-5xl md:text-6xl font-black text-[#0056b3] mb-4 tracking-tight">
                                    اختبار أساسيات البرمجة
                                </h1>
                                <p className="text-xl text-gray-600 font-medium">
                                    اختبار المحاضرة التأسيسية
                                </p>
                            </div>

                            <div className="space-y-6">
                                <div className="flex justify-center gap-8 text-gray-600 mb-8">
                                    <div className="flex flex-col items-center">
                                        <span className="font-bold text-lg text-gray-800">{questionsData.length}</span>
                                        <span className="text-sm">سؤال</span>
                                    </div>
                                    <div className="w-px bg-gray-300"></div>
                                    <div className="flex flex-col items-center">
                                        <span className="font-bold text-lg text-gray-800">10</span>
                                        <span className="text-sm">دقيقة</span>
                                    </div>
                                </div>

                                <button 
                                    onClick={() => setHasStarted(true)}
                                    className="btn-pulse bg-[#0056b3] text-white text-2xl font-bold py-4 px-16 rounded-full hover:bg-blue-700 transition transform hover:scale-105 shadow-xl w-full md:w-auto"
                                >
                                    ابــدأ الآن
                                </button>
                                <p className="text-gray-400 text-sm mt-4">
                                    بالضغط على "ابدأ"، سيبدأ العداد التنازلي مباشرة.
                                </p>
                            </div>
                        </div>
                    </div>
                );
            }

            // --- 2. RESULT SCREEN ---
            if (isFinished) {
                let message = "";
                let colorClass = "";
                if (scoreData.percentage >= 80) {
                    message = "امتياز";
                    colorClass = "text-green-600";
                } else if (scoreData.percentage >= 60) {
                    message = "جيد جدا";
                    colorClass = "text-blue-600";
                } else {
                    message = "حاول مرة اخري";
                    colorClass = "text-red-600";
                }

                return (
                    <div className="flex flex-col items-center justify-center h-full bg-gray-50 p-6 animate-fade-in overflow-y-auto">
                        <div className="bg-white p-8 rounded-lg shadow-xl text-center max-w-2xl w-full border-t-8 border-[#0056b3] my-6">
                            <h1 className="text-4xl font-bold mb-4 text-[#0056b3]">نتيجة الاختبار</h1>
                            <div className="text-6xl font-bold mb-6 text-gray-800">
                                {scoreData.score} / {questionsData.length}
                            </div>
                            <div className="w-full bg-gray-200 rounded-full h-4 mb-6">
                                <div 
                                    className="bg-[#0056b3] h-4 rounded-full transition-all duration-1000" 
                                    style={{width: `${scoreData.percentage}%`}}
                                ></div>
                            </div>
                            <p className={`text-xl font-semibold mb-8 ${colorClass}`}>
                                {message}
                            </p>
                            
                            <div className="text-right border-t pt-6 max-h-96 overflow-y-auto">
                                <h3 className="font-bold text-gray-700 mb-4">مراجعة الإجابات:</h3>
                                {questionsData.map((q, idx) => (
                                    <div key={idx} className="mb-4 p-3 bg-gray-50 rounded border">
                                        <div className="font-bold text-sm text-gray-500 mb-1">سؤال {idx + 1}</div>
                                        <div className="font-semibold text-gray-800 mb-1">{q.question}</div>
                                        <div className="flex items-center gap-2 mt-1 flex-wrap">
                                            <span className={answers[idx] === q.correctIndex ? "text-green-600 font-bold" : "text-red-600 font-bold"}>
                                                {answers[idx] === q.correctIndex ? "إجابة صحيحة" : (answers[idx] === undefined ? "لم تتم الإجابة" : "إجابة خاطئة")}
                                            </span>
                                            {answers[idx] !== q.correctIndex && (
                                                <span className="text-gray-500 text-sm">
                                                    (الصحيح: {q.options[q.correctIndex]})
                                                </span>
                                            )}
                                        </div>
                                        <p className="text-xs text-gray-600 mt-1">{q.rationale}</p>
                                    </div>
                                ))}
                            </div>

                            <button 
                                onClick={() => window.location.reload()}
                                className="mt-6 px-8 py-3 bg-[#0056b3] text-white rounded hover:bg-blue-700 transition font-bold"
                            >
                                العودة للصفحة الرئيسية
                            </button>
                        </div>
                    </div>
                );
            }

            const currentQuestion = questionsData[currentQuestionIndex];

            // --- 3. EXAM INTERFACE ---
            return (
                <div className="flex flex-col h-full relative animate-fade-in">
                    <header className="flex justify-between items-center p-4 shadow-sm border-b bg-white z-10 h-16">
                        <div className="flex items-center gap-4">
                            <div className="bg-[#0056b3] text-white font-bold px-3 py-1 rounded text-sm">
                                اختبار أساسيات البرمجة
                            </div>
                            <div className="font-bold text-gray-700 hidden sm:block">م/ أحمد عبدالغني</div>
                        </div>
                        
                        <div className="hidden md:flex gap-1 overflow-x-auto px-4 nav-scroll">
                            {questionsData.map((_, idx) => (
                                <button
                                    key={idx}
                                    onClick={() => setCurrentQuestionIndex(idx)}
                                    className={`w-8 h-8 rounded flex items-center justify-center text-sm font-bold transition-all flex-shrink-0
                                        ${currentQuestionIndex === idx ? 'ring-2 ring-[#0056b3] ring-offset-1' : ''}
                                        ${flagged[idx] ? 'bg-orange-100 text-orange-600 border border-orange-400' : 
                                          answers[idx] !== undefined ? 'bg-green-100 text-green-700 border border-green-200' : 'bg-gray-100 text-gray-500'}
                                    `}
                                >
                                    {idx + 1}
                                </button>
                            ))}
                        </div>

                        <div className={`font-mono text-xl font-bold w-24 text-center ${timeLeft < 300 ? 'text-red-600 animate-pulse' : 'text-gray-700'}`}>
                            {formatTime(timeLeft)}
                        </div>
                    </header>

                    <main className="flex-1 flex flex-col md:flex-row overflow-hidden bg-gray-50">
                        <div className="flex-1 overflow-y-auto p-4 md:p-8 pb-24">
                            <div className="max-w-4xl mx-auto bg-white rounded-lg shadow-sm border p-6 min-h-[400px]">
                                <div className="flex justify-between items-start mb-6">
                                    <span className="text-gray-500 font-bold text-lg">سؤال {currentQuestionIndex + 1} من {questionsData.length}</span>
                                    <button 
                                        onClick={toggleFlag}
                                        className={`flex items-center gap-2 px-3 py-1 rounded border transition ${flagged[currentQuestionIndex] ? 'bg-orange-50 border-orange-400 text-orange-600' : 'text-gray-400 border-gray-200 hover:bg-gray-50'}`}
                                    >
                                        <i className={`fa-solid fa-flag ${flagged[currentQuestionIndex] ? 'text-orange-500' : ''}`}></i>
                                        <span className="text-sm font-bold">مراجعة لاحقاً</span>
                                    </button>
                                </div>

                                <h2 className="text-xl font-bold text-gray-800 mb-8 border-r-4 border-[#0056b3] pr-4">
                                    {currentQuestion.question}
                                </h2>

                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    {currentQuestion.options.map((opt, idx) => (
                                        <label 
                                            key={idx}
                                            className={`
                                                relative flex items-center p-4 rounded-lg border-2 cursor-pointer transition-all duration-200 group
                                                ${answers[currentQuestionIndex] === idx 
                                                    ? 'border-[#0056b3] bg-blue-50 shadow-md' 
                                                    : 'border-gray-200 hover:border-gray-300 bg-white'}
                                            `}
                                        >
                                            <input 
                                                type="radio" 
                                                name={`q-${currentQuestionIndex}`} 
                                                className="hidden" 
                                                checked={answers[currentQuestionIndex] === idx}
                                                onChange={() => handleAnswerSelect(idx)}
                                            />
                                            <div className={`
                                                w-6 h-6 rounded-full border-2 ml-4 flex items-center justify-center flex-shrink-0
                                                ${answers[currentQuestionIndex] === idx ? 'border-[#0056b3]' : 'border-gray-300 group-hover:border-gray-400'}
                                            `}>
                                                {answers[currentQuestionIndex] === idx && (
                                                    <div className="w-3 h-3 rounded-full bg-[#0056b3]"></div>
                                                )}
                                            </div>
                                            <span className="text-lg font-medium text-gray-700">{opt}</span>
                                        </label>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </main>

                    <footer className="bg-white p-4 border-t shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.1)] z-20 flex justify-between items-center h-20">
                        <button 
                            onClick={() => setCurrentQuestionIndex(prev => Math.max(0, prev - 1))}
                            disabled={currentQuestionIndex === 0}
                            className="px-6 py-2 border-2 border-gray-300 text-gray-600 font-bold rounded hover:bg-gray-100 disabled:opacity-50 disabled:cursor-not-allowed transition"
                        >
                            السابق
                        </button>

                        <div className="hidden md:block w-1/3 bg-gray-200 rounded-full h-2">
                             <div 
                                className="bg-[#4CAF50] h-2 rounded-full transition-all duration-300"
                                style={{width: `${(Object.keys(answers).length / questionsData.length) * 100}%`}}
                            ></div>
                        </div>

                        {currentQuestionIndex === questionsData.length - 1 ? (
                            <button 
                                onClick={finishExam}
                                className="px-8 py-2 bg-[#0056b3] text-white font-bold rounded hover:bg-blue-700 shadow-lg hover:shadow-xl transition transform hover:-translate-y-0.5"
                            >
                                إنهاء الامتحان
                            </button>
                        ) : (
                            <button 
                                onClick={() => setCurrentQuestionIndex(prev => Math.min(questionsData.length - 1, prev + 1))}
                                className="px-8 py-2 bg-[#0056b3] text-white font-bold rounded hover:bg-blue-700 shadow hover:shadow-md transition"
                            >
                                التالي
                            </button>
                        )}
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
